# golangci-lint configuration for production-ready code
run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - typecheck     # Type check
    - unused        # Check for unused constants, variables, functions
    - gofmt         # Check code is formatted
    - goimports     # Check imports are formatted
    - misspell      # Check for misspelled English words
    - gocritic      # Provides diagnostics that check for bugs, performance and style
    - revive        # Fast, configurable, extensible, flexible linter
    - gosec         # Security problems
    - exportloopref # Check for pointers to enclosing loop variables
    - nilerr        # Check that there is no simultaneous return of nil error and non-nil value

linters-settings:
  errcheck:
    check-blank: true
    check-type-assertions: true
  
  govet:
    check-shadowing: true
  
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: var-naming
      - name: package-comments
        disabled: true
  
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104 # Duplicated errcheck checks
  
  gofmt:
    simplify: true

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - errcheck
